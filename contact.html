<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actor Vijay | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <!-- Navigation -->
        <nav>
            <div class="logo">
                <div class="logo-circle">V</div>
                Actor Vijay
            </div>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="projects.html">Portfolio</a></li>
                <li><a href="contact.html" class="btn-primary">Contact</a></li>
            </ul>
        </nav>
        <script src="script.js"></script>

        <header class="page-header">
            <h1>Get in Touch</h1>
        </header>

        <div style="display: flex; gap: 50px; margin-bottom: 60px;">
            <div style="flex: 1;">
                 <h2 style="font-size: 28px; margin-bottom: 20px;">Let's work together</h2>
                 <p style="margin-bottom: 30px; color: #666;">
                     Have a script, a role, or an event in mind? I'd love to hear from you.
                 </p>
                 <div style="margin-bottom: 20px;">
                     <strong>Email:</strong> <span style="color: var(--primary-color);">contact@actorvijay.com</span>
                 </div>
                 <div style="margin-bottom: 20px;">
                     <strong>Phone:</strong> <span style="color: var(--primary-color);">+91 98765 43210</span>
                 </div>
            </div>

            <div style="flex: 1; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.05);">
                <form action="">
                    <input type="text" placeholder="Your Name">
                    <input type="email" placeholder="Your Email Address">
                    <input type="text" placeholder="Subject">
                    <textarea rows="5" placeholder="Message"></textarea>
                    <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>

    </div>

</body>
</html>
